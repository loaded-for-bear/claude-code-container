services:
  claude-code:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
      args:
        # 3-A: Flutter/Chromium が必要な場合は "true" に変更（デフォルト: false = 攻撃面縮小・ビルド高速化）
        INSTALL_FLUTTER: "false"
    container_name: claude-code-container

    volumes:
      - ./workspace:/workspace
      - vscode-server-extensions:/home/developer/.vscode-server/extensions
      - vscode-server-extensionsinsiders:/home/developer/.vscode-server-insiders/extensions
      - pip-cache:/home/developer/.cache/pip
      - npm-global:/home/developer/.npm-global
      - flutter-pub-cache:/home/developer/.pub-cache
      - claude-config:/home/developer/.claude
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git

    working_dir: /workspace

    tty: true
    stdin_open: true

    # H-4: 127.0.0.1 にバインドし LAN 上の他デバイスからの直接アクセスを遮断
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:5000:5000"
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:5173:5173"

    environment:
      - TZ=Asia/Tokyo
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - FLUTTER_ROOT=/opt/flutter
      - CHROME_EXECUTABLE=/usr/bin/chromium
      - NPM_CONFIG_PREFIX=/home/developer/.npm-global
      - CARGO_HOME=/usr/local/cargo
      - RUSTUP_HOME=/usr/local/rustup
      # C-3: egress proxy 経由のみアウトバウンドを許可（allowlist: squid.conf 参照）
      - HTTP_PROXY=http://egress-proxy:3128
      - HTTPS_PROXY=http://egress-proxy:3128
      - http_proxy=http://egress-proxy:3128
      - https_proxy=http://egress-proxy:3128
      - NO_PROXY=localhost,127.0.0.1
      - no_proxy=localhost,127.0.0.1

    # 3-B: setuid バイナリによる権限昇格を禁止（Docker デフォルト seccomp は維持）
    security_opt:
      - no-new-privileges:true

    # L-1: Linux Capabilities を最小化（不要な特権を根本排除）
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE   # vscode-lldb デバッガー（プロセスアタッチ）に必要

    # H-5: リソース制限（DoS 対策 / ホスト保護）
    deploy:
      resources:
        limits:
          cpus: '4'       # 最大 4 コア（fork bomb・暴走プロセス対策）
          memory: 6g      # 最大 6GB（重い Rust ビルドや ML も考慮）

    pids_limit: 512       # プロセス数上限（fork bomb 対策）

    ulimits:
      nofile:
        soft: 1024        # オープンできるファイル記述子数（上限 4096 まで自己拡張可）
        hard: 4096

    # C-3: internal ネットワーク（インターネット直接アクセス不可）
    # 外部通信は egress-proxy 経由のみ
    networks:
      - internal

    restart: unless-stopped

    depends_on:
      - egress-proxy

  # C-3: Egress フィルタリングプロキシ（Squid）
  # allowlist 以外のドメインへのアウトバウンドをブロック
  egress-proxy:
    image: ubuntu/squid:latest
    container_name: claude-code-egress-proxy
    volumes:
      - ./egress-proxy/squid.conf:/etc/squid/squid.conf:ro
    networks:
      - internal       # claude-code からのリクエストを受け付ける
      - claude-network # インターネットへの出口
    restart: unless-stopped

volumes:
  vscode-server-extensions:
  vscode-server-extensionsinsiders:
  pip-cache:
  npm-global:
  flutter-pub-cache:
  claude-config:
  cargo-registry:
  cargo-git:

networks:
  # C-3: インターネット直接アクセス不可のネットワーク（claude-code 用）
  internal:
    driver: bridge
    internal: true

  # egress-proxy のみが接続するインターネット出口ネットワーク
  claude-network:
    driver: bridge
