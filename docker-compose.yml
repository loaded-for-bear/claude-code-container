services:
  claude-code:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    container_name: claude-code-container
    
    volumes:
      - ./workspace:/workspace
      - vscode-server-extensions:/home/developer/.vscode-server/extensions
      - vscode-server-extensionsinsiders:/home/developer/.vscode-server-insiders/extensions
      - pip-cache:/home/developer/.cache/pip
      - npm-global:/home/developer/.npm-global
      - flutter-pub-cache:/home/developer/.pub-cache
      - claude-config:/home/developer/.claude
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    
    working_dir: /workspace
    
    tty: true
    stdin_open: true
    
    ports:
      - "3000:3000"
      - "8080:8080"
      - "5000:5000"
      - "8888:8888"
      - "5173:5173"
    
    environment:
      - TZ=Asia/Tokyo
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - FLUTTER_ROOT=/opt/flutter
      - CHROME_EXECUTABLE=/usr/bin/chromium
      - NPM_CONFIG_PREFIX=/home/developer/.npm-global
      - CARGO_HOME=/usr/local/cargo
      - RUSTUP_HOME=/usr/local/rustup
    
    networks:
      - claude-network
    
    restart: unless-stopped

volumes:
  vscode-server-extensions:
  vscode-server-extensionsinsiders:
  pip-cache:
  npm-global:
  flutter-pub-cache:
  claude-config:
  cargo-registry:
  cargo-git:

networks:
  claude-network:
    driver: bridge