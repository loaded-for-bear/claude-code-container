services:
  claude-code:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
      args:
        # 3-A: Flutter/Chromium が必要な場合は "true" に変更（デフォルト: false = 攻撃面縮小・ビルド高速化）
        INSTALL_FLUTTER: "false"
    container_name: claude-code-container
    
    volumes:
      - ./workspace:/workspace
      - vscode-server-extensions:/home/developer/.vscode-server/extensions
      - vscode-server-extensionsinsiders:/home/developer/.vscode-server-insiders/extensions
      - pip-cache:/home/developer/.cache/pip
      - npm-global:/home/developer/.npm-global
      - flutter-pub-cache:/home/developer/.pub-cache
      - claude-config:/home/developer/.claude
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    
    working_dir: /workspace
    
    tty: true
    stdin_open: true
    
    ports:
      - "3000:3000"
      - "8080:8080"
      - "5000:5000"
      - "8888:8888"
      - "5173:5173"
    
    environment:
      - TZ=Asia/Tokyo
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - FLUTTER_ROOT=/opt/flutter
      - CHROME_EXECUTABLE=/usr/bin/chromium
      - NPM_CONFIG_PREFIX=/home/developer/.npm-global
      - CARGO_HOME=/usr/local/cargo
      - RUSTUP_HOME=/usr/local/rustup
    
    # 3-B: setuid バイナリによる権限昇格を禁止（Docker デフォルト seccomp は維持）
    security_opt:
      - no-new-privileges:true

    # H-5: リソース制限（DoS 対策 / ホスト保護）
    deploy:
      resources:
        limits:
          cpus: '4'       # 最大 4 コア（fork bomb・暴走プロセス対策）
          memory: 6g      # 最大 6GB（重い Rust ビルドや ML も考慮）

    pids_limit: 512       # プロセス数上限（fork bomb 対策）

    ulimits:
      nofile:
        soft: 1024        # オープンできるファイル記述子数（上限 4096 まで自己拡張可）
        hard: 4096

    networks:
      - claude-network

    restart: unless-stopped

volumes:
  vscode-server-extensions:
  vscode-server-extensionsinsiders:
  pip-cache:
  npm-global:
  flutter-pub-cache:
  claude-config:
  cargo-registry:
  cargo-git:

networks:
  claude-network:
    driver: bridge