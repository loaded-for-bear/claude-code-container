# ============================================================
# Egress Proxy: Claude Code Allowlist (External List Support)
# ============================================================

pid_filename /tmp/squid.pid
coredump_dir /tmp

# --- [Allowlist Definitions] ---

# 1. システム・開発用（直接記述）
acl fixed_domains dstdomain .anthropic.com .claude.ai .claude.com
acl fixed_domains dstdomain .github.com .githubusercontent.com .githubcopilot.com .exp-tas.com
acl fixed_domains dstdomain registry.npmjs.org .npmjs.com
acl fixed_domains dstdomain pypi.org files.pythonhosted.org
acl fixed_domains dstdomain .crates.io .rust-lang.org
acl fixed_domains dstdomain .vo.msecnd.net .vsassets.io .gallery.vsassets.io

# 2. スクレイピング対象（外部ファイル /etc/squid/allowlist.txt から読み込み）
acl scraping_sites dstdomain "/etc/squid/allowlist.txt"

# --- [Control Rules] ---

acl CONNECT method CONNECT
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443

# Access Control (システム用と外部リストの両方を許可)
http_access allow fixed_domains Safe_ports !CONNECT
http_access allow CONNECT fixed_domains SSL_ports

http_access allow scraping_sites Safe_ports !CONNECT
http_access allow CONNECT scraping_sites SSL_ports

# それ以外はすべて拒否
http_access deny all

# Proxy Port
http_port 3128

# Logging & Performance
access_log stdio:/dev/stdout combined
cache_log stdio:/dev/stderr
cache_store_log none
cache deny all
maximum_object_size 0 bytes