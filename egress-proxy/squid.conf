# ============================================================
# Egress Proxy: claude-code-container 専用 allowlist
# ============================================================
# ここに記載されていないドメインへのアウトバウンドはすべてブロック。
# ドメインを追加する場合は allowed_domains ACL に追記して再ビルド不要で反映。
# （docker compose restart egress-proxy）

# --- 許可ドメイン ---
acl allowed_domains dstdomain \
    api.anthropic.com \
    github.com \
    .github.com \
    .githubusercontent.com \
    registry.npmjs.org \
    .npmjs.com \
    pypi.org \
    files.pythonhosted.org \
    crates.io \
    .crates.io

# --- ポート / メソッド ACL ---
acl CONNECT method CONNECT
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443

# --- アクセス制御 ---
# HTTP (port 80): allowlist のみ許可
http_access allow allowed_domains Safe_ports !CONNECT

# HTTPS (CONNECT tunnel, port 443): allowlist のみ許可
http_access allow CONNECT allowed_domains SSL_ports

# それ以外はすべてブロック
http_access deny all

# --- プロキシポート ---
http_port 3128

# --- ログ（標準出力へ）---
access_log stdio:/dev/stdout combined
cache_log stdio:/dev/stderr
cache_store_log none

# --- キャッシュ無効（純粋なフォワードプロキシとして動作） ---
cache deny all
maximum_object_size 0 bytes
